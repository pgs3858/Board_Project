spring:
  datasource:
    url: jdbc:h2:mem:db_dev;MODE=MySQL









#  메모리 모드 H2 DB
#  jdbc:h2:mem:db_dev
#  → 메모리 안에서만 존재하는 DB를 의미
#  → 서버를 껐다 켜면 데이터가 완전히 사라짐
#  → 테스트나 개발용으로 많이 사용
#
#  이전 ./db_dev는 파일 모드 → 프로젝트 폴더에 DB 파일 저장
#  지금 mem은 메모리 모드 → 서버 종료 시 데이터 사라짐
#
#  2️⃣ MySQL 호환 모드
#  ;MODE=MySQL
#  → H2가 MySQL 문법처럼 동작하도록 설정
#  → JPA 쿼리나 SQL 문법 테스트 시 MySQL과 유사하게 동작



#
#    서버 시작
#
#    jdbc:h2:mem:db_dev 설정이니까 서버가 켜지는 순간 메모리 안에 DB 생성
#
#    아직 테이블/데이터는 없고, 애플리케이션에서 엔티티 정의(JPA)가 있으면 그걸 기반으로 테이블 생성됨
#
#    코드 실행 / 테스트
#
#    JPA Repository나 SQL 코드가 실행되면서 테이블 생성 + 데이터 삽입
#
#    데이터는 메모리에만 존재
#
#    서버 종료
#
#    메모리에 있던 DB 전체가 휘발성으로 사라짐
#
#    다시 서버 켜면 DB는 새로 초기화된 상태로 생성됨